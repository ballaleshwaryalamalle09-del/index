<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: #ff4b5c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff1e3c;
    }

    .hidden {
      display: none;
      margin-top: 15px;
      font-size: 18px;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="card">
  <h1>🎂 Happy Birthday ❤️</h1>
  <p>To the most special person in my life 💖<br>
     You make my world brighter every single day ✨<br>
     I hope your day is filled with love, smiles, and happiness 😊</p>

  <button onclick="showMessage()">Tap for Surprise 🎁</button>

  <div id="loveMessage" class="hidden">
    💕 I really like you... maybe more than I should 😅<br>
    You are truly special to me 💫
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("loveMessage").style.display = "block";
  startConfetti();
}

// Simple Confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

for (let i = 0; i < 100; i++) {
  confetti.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 6 + 2,
    d: Math.random() * 100
  });
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  ctx.beginPath();
  for (let i = 0; i < confetti.length; i++) {
    let c = confetti[i];
    ctx.moveTo(c.x, c.y);
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2, true);
  }
  ctx.fill();
  updateConfetti();
}

function updateConfetti() {
  for (let i = 0; i < confetti.length; i++) {
    let c = confetti[i];
    c.y += Math.cos(c.d) + 1 + c.r / 2;
    if (c.y > canvas.height) {
      confetti[i] = { x: Math.random() * canvas.width, y: 0, r: c.r, d: c.d };
    }
  }
}

function startConfetti() {
  setInterval(drawConfetti, 20);
}
</script>

</body>
</html>
